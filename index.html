<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>

    <meta property="og:type" content="website">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0F2B5C',      /* 信任深藍 */
                            lightBlue: '#F1F5F9', 
                            gold: '#D4AF37',      
                            dark: '#0F172A'       
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; }
        .license-placeholder {
            border: 2px dashed #CBD5E1;
            background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 5V19M5 12H19' stroke='%2394A3B8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: center;
        }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-white shadow-[0_0_50px_rgba(15,43,92,0.08)] flex flex-col justify-between relative min-h-screen">
        
        <!-- Header -->
        <header class="bg-brand-blue text-white px-6 pt-10 pb-12 rounded-b-[2.5rem] relative shadow-lg">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span class="text-[11px] font-bold tracking-wider bg-white/20 text-blue-100 px-3 py-1 rounded-full backdrop-blur-sm">📍 台中清水</span>
                    <h1 class="text-3xl font-bold tracking-widest mt-2.5">建誠水電工程行</h1>
                    <p class="text-xs text-blue-200 mt-1.5 tracking-widest font-light">用心服務 ｜ 品質保證</p>
                </div>
                <button onclick="toggleAdminModal(true)" class="text-blue-300 hover:text-white transition duration-200 p-2 hover:bg-white/10 rounded-xl">
                    <svg class="w-10 h-10 animate-[spin_12s_linear_infinite]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
            </div>
            <div class="text-xs text-blue-300 font-mono tracking-wider">統一編號：00852834</div>
            <div class="absolute -bottom-8 left-6 right-6 bg-white text-slate-800 rounded-2xl p-4 shadow-[0_10px_25px_rgba(15,43,92,0.1)] flex items-center justify-between border border-slate-50 gap-2">
                <div>
                    <span class="text-[10px] text-slate-400 font-bold tracking-wider uppercase block">負責人 / 技術士</span>
                    <div class="text-xl font-bold text-slate-800 tracking-widest mt-0.5">王建智</div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="shareApp()" class="border border-slate-200 text-slate-600 px-5 py-2.5 rounded-xl font-bold text-[15px] active:scale-95 transition whitespace-nowrap">點擊分享名片</button>
                    <a href="tel:0966869611" class="bg-emerald-500 text-white px-3 py-2.5 rounded-xl font-bold text-xs tracking-wider active:scale-95 transition flex items-center gap-1.5 whitespace-nowrap">0966-869-611</a>
                </div>
            </div>
        </header>

        <main class="px-6 pt-14 pb-24 flex-1 space-y-8">
            <section class="grid grid-cols-3 gap-3">
                <a href="tel:0966869611" class="flex flex-col items-center justify-center p-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-brand-blue">
                    <div class="p-2.5 bg-white rounded-xl shadow-sm mb-1.5 text-blue-600">📞</div><span class="text-[11px] font-bold">電話諮詢</span>
                </a>
                <button onclick="toggleLineModal(true)" class="flex flex-col items-center justify-center p-3.5 bg-emerald-50/50 border border-emerald-100 rounded-2xl text-emerald-800">
                    <div class="p-2.5 bg-white rounded-xl shadow-sm mb-1.5 text-emerald-500">💬</div><span class="text-[11px] font-bold">加 LINE</span>
                </button>
                <a href="https://www.google.com/maps/search/?api=1&query=台中市清水區中山路560之6號" target="_blank" class="flex flex-col items-center justify-center p-3.5 bg-rose-50/50 border border-rose-100 rounded-2xl text-rose-800">
                    <div class="p-2.5 bg-white rounded-xl shadow-sm mb-1.5 text-rose-500">📍</div><span class="text-[11px] font-bold">工廠導航</span>
                </a>
            </section>

            <section class="space-y-4">
                <h2 class="text-base font-bold text-slate-800 flex items-center gap-2"><span class="w-1.5 h-4 bg-brand-blue rounded-full"></span>專業工程服務項目</h2>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="openServiceGallery('water_elec', '水電維修', '🔧')" class="bg-slate-50 border border-slate-100 rounded-xl p-3.5 flex items-center gap-3 active:scale-95 transition text-left w-full"><span class="text-xl">🔧</span><span class="text-xs font-semibold text-slate-700">水電維修</span></button>
                    <button onclick="openServiceGallery('wiring', '室內配線', '🔌')" class="bg-slate-50 border border-slate-100 rounded-xl p-3.5 flex items-center gap-3 active:scale-95 transition text-left w-full"><span class="text-xl">🔌</span><span class="text-xs font-semibold text-slate-700">室內配線</span></button>
                    <button onclick="openServiceGallery('bathroom', '衛浴設備', '🚿')" class="bg-slate-50 border border-slate-100 rounded-xl p-3.5 flex items-center gap-3 active:scale-95 transition text-left w-full"><span class="text-xl">🚿</span><span class="text-xs font-semibold text-slate-700">衛浴設備</span></button>
                    <button onclick="openServiceGallery('lighting', '燈具安裝', '💡')" class="bg-slate-50 border border-slate-100 rounded-xl p-3.5 flex items-center gap-3 active:scale-95 transition text-left w-full"><span class="text-xl">💡</span><span class="text-xs font-semibold text-slate-700">燈具安裝</span></button>
                    <button onclick="openServiceGallery('house_repair', '房屋修繕', '🏠')" class="bg-slate-50 border border-slate-100 rounded-xl p-3.5 flex items-center gap-3 active:scale-95 transition text-left w-full"><span class="text-xl">🏠</span><span class="text-xs font-semibold text-slate-700">房屋修繕</span></button>
                    <button onclick="openServiceGallery('motor', '馬達安裝', '⚙️')" class="bg-slate-50 border border-slate-100 rounded-xl p-3.5 flex items-center gap-3 active:scale-95 transition text-left w-full"><span class="text-xl">⚙️</span><span class="text-xs font-semibold text-slate-700">馬達安裝</span></button>
                    <button onclick="openServiceGallery('project', '工程承包', '📋')" class="bg-slate-50 border border-slate-100 rounded-xl p-3.5 flex items-center gap-3 active:scale-95 transition text-left w-full"><span class="text-xl">📋</span><span class="text-xs font-semibold text-slate-700">工程承包</span></button>
                    <button onclick="openServiceGallery('plumbing', '水管疏通', '🌀')" class="bg-slate-50 border border-slate-100 rounded-xl p-3.5 flex items-center gap-3 active:scale-95 transition text-left w-full"><span class="text-xl">🌀</span><span class="text-xs font-semibold text-slate-700">水管疏通</span></button>
                </div>
            </section>
        </main>

        <!-- 實績照片燈箱 -->
        <div id="serviceGalleryModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[130] flex items-end sm:items-center justify-center p-0 sm:p-6">
            <div class="bg-white rounded-t-[2rem] sm:rounded-3xl w-full max-w-md max-h-[85vh] flex flex-col shadow-2xl overflow-hidden border border-slate-50">
                <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between bg-brand-blue text-white">
                    <div class="flex items-center gap-2.5">
                        <span id="serviceGalleryEmo" class="text-2xl"></span>
                        <h3 id="serviceGalleryTitle" class="font-bold text-base">施工實績</h3>
                    </div>
                    <button onclick="closeServiceGallery()" class="text-white/80 hover:text-white p-1">✕</button>
                </div>
                <div id="serviceGalleryContent" class="flex-1 p-6 overflow-y-auto space-y-4 bg-slate-50/50"></div>
            </div>
        </div>

        <!-- 燈箱等其他功能 -->
        <div id="lineModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6"><div class="bg-white rounded-3xl p-6 w-full max-w-xs text-center relative"><button onclick="toggleLineModal(false)" class="absolute top-4 right-4">✕</button><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://line.me/ti/p/tj71THzdlI" class="w-40 h-40 mx-auto"></div></div>
        <div id="licenseGalleryModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[140] flex items-center justify-center p-6"><div class="bg-white rounded-3xl w-full max-w-md max-h-[80vh] overflow-y-auto p-6 relative"><button onclick="closeLicenseGallery()" class="absolute top-4 right-4">✕</button><div id="licensePlaceholderGrid" class="space-y-4"></div></div></div>
        <div id="adminModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6"><div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center relative"><button onclick="toggleAdminModal(false)" class="absolute top-4 right-4">✕</button><button onclick="exportFinalHtml()" class="w-full py-3 bg-brand-blue text-white rounded-xl">一鍵打包下載</button></div></div>
    </div>

    <script>
        const CLOUD_PERMANENT_PHOTOS = {
            "water_elec": ["https://wu2136tr-coder.github.io/JianCheng/pics/fix-b1.jpg", "https://wu2136tr-coder.github.io/JianCheng/pics/fix-a1.jpg"],
            "bathroom": ["https://wu2136tr-coder.github.io/JianCheng/pics/bathroom1-b1.jpg", "https://wu2136tr-coder.github.io/JianCheng/pics/bathroom2-a1.jpg"],
            "house_repair": ["https://wu2136tr-coder.github.io/JianCheng/pics/room-b1.jpg", "https://wu2136tr-coder.github.io/JianCheng/pics/room-b2.jpg", "https://wu2136tr-coder.github.io/JianCheng/pics/room-a1.jpg"],
            "project": ["https://wu2136tr-coder.github.io/JianCheng/pics/projext-b1.jpg", "https://wu2136tr-coder.github.io/JianCheng/pics/projext-b2.jpg", "https://wu2136tr-coder.github.io/JianCheng/pics/projext-a1.jpg"],
            "plumbing": ["https://wu2136tr-coder.github.io/JianCheng/pics/water-pipr.jpg"],
            "licenses": ["https://wu2136tr-coder.github.io/JianCheng/pics/room.jpg", "https://wu2136tr-coder.github.io/JianCheng/pics/room1.jpg", "https://wu2136tr-coder.github.io/JianCheng/pics/electronic.jpg", "https://wu2136tr-coder.github.io/JianCheng/pics/water.jpg", "https://wu2136tr-coder.github.io/JianCheng/pics/water-pipe.jpg"]
        };

        function openServiceGallery(id, name, emo) {
            const modal = document.getElementById('serviceGalleryModal'), content = document.getElementById('serviceGalleryContent');
            document.getElementById('serviceGalleryTitle').innerText = name; document.getElementById('serviceGalleryEmo').innerText = emo; content.innerHTML = '';
            
            if(id === 'plumbing') {
                content.innerHTML = `<h4 class="font-bold">水管疏通</h4><img src="https://wu2136tr-coder.github.io/JianCheng/pics/water-pipr.jpg" class="rounded-xl w-full">`;
            } else if(id === 'house_repair') {
                content.innerHTML = `<h4 class="font-bold">水管漏水修繕</h4><div class="space-y-2"><span class="text-[9px] bg-red-100 px-2 py-1 rounded">施工前</span><img src="https://wu2136tr-coder.github.io/JianCheng/pics/room-b1.jpg" class="rounded-xl w-full"><img src="https://wu2136tr-coder.github.io/JianCheng/pics/room-b2.jpg" class="rounded-xl w-full"></div><div class="space-y-2"><span class="text-[9px] bg-green-100 px-2 py-1 rounded">施工後</span><img src="https://wu2136tr-coder.github.io/JianCheng/pics/room-a1.jpg" class="rounded-xl w-full"></div>`;
            } else if(id === 'project') {
                content.innerHTML = `<h4 class="font-bold">更換揚水馬達工程</h4><div class="space-y-2"><span class="text-[9px] bg-red-100 px-2 py-1 rounded">施工中</span><img src="https://wu2136tr-coder.github.io/JianCheng/pics/projext-b1.jpg" class="rounded-xl w-full"><img src="https://wu2136tr-coder.github.io/JianCheng/pics/projext-b2.jpg" class="rounded-xl w-full"></div><div class="space-y-2"><span class="text-[9px] bg-green-100 px-2 py-1 rounded">施工後</span><img src="https://wu2136tr-coder.github.io/JianCheng/pics/projext-a1.jpg" class="rounded-xl w-full"></div>`;
            } else if(CLOUD_PERMANENT_PHOTOS[id]) {
                CLOUD_PERMANENT_PHOTOS[id].forEach(src => content.innerHTML += `<img src="${src}" class="rounded-xl w-full mb-4">`);
            } else { content.innerHTML = '<p class="text-center text-slate-400">目前尚無實績</p>'; }
            modal.classList.remove('hidden');
        }

        function closeServiceGallery() { document.getElementById('serviceGalleryModal').classList.add('hidden'); }
        function openLicenseGallery() { document.getElementById('licenseGalleryModal').classList.remove('hidden'); renderLicenses(); }
        function closeLicenseGallery() { document.getElementById('licenseGalleryModal').classList.add('hidden'); }
        function renderLicenses() { const grid = document.getElementById('licensePlaceholderGrid'); grid.innerHTML = ''; CLOUD_PERMANENT_PHOTOS.licenses.forEach(src => grid.innerHTML += `<img src="${src}" class="rounded-xl border">`); }
        function toggleLineModal(s) { document.getElementById('lineModal').classList.toggle('hidden', !s); }
        function toggleAdminModal(s) { document.getElementById('adminModal').classList.toggle('hidden', !s); }
        function toggleCardModal(s) { document.getElementById('cardShareModal').classList.toggle('hidden', !s); }
        function shareApp() { toggleCardModal(true); }
        function copyCardUrl() { alert("已複製"); }
        async function exportFinalHtml() { const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'index.html'; a.click(); }
    </script>
</body>
</html>
